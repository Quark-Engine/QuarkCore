name: Build and Package

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DQC_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare Artifacts
        run: |
          mkdir artifacts
          copy build\Release\QuarkCore.lib artifacts\
          copy build\Release\*.exe artifacts\
          copy build\Release\*.dll artifacts\
          xcopy /E /I include artifacts\include

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: QuarkCore-Windows-Binary
          path: artifacts/
          if-no-files-found: error
          retention-days: 5

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          build-essential \
          git \
          make \
          pkg-config \
          cmake \
          ninja-build \
          gnome-desktop-testing \
          libasound2-dev \
          libpulse-dev \
          libaudio-dev \
          libfribidi-dev \
          libjack-dev \
          libsndio-dev \
          libx11-dev \
          libxext-dev \
          libxrandr-dev \
          libxcursor-dev \
          libxfixes-dev \
          libxi-dev \
          libxss-dev \
          libxtst-dev \
          libxkbcommon-dev \
          libdrm-dev \
          libgbm-dev \
          libgl1-mesa-dev \
          libgles2-mesa-dev \
          libegl1-mesa-dev \
          libdbus-1-dev \
          libibus-1.0-dev \
          libudev-dev \
          libthai-dev \
          libusb-1.0-0-dev \
          libvulkan-dev \
          vulkan-validationlayers \
          libxinerama-dev \
          libxxf86vm-dev \
          libwayland-dev \
          wayland-protocols

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DQC_BUILD_EXAMPLES=ON -DASSIMP_BUILD_ZLIB=OFF -DCMAKE_POSITION_INDEPENDENT_CODE=ON -G Ninja

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare Artifacts
        run: |
          mkdir -p artifacts/include
          cp build/libQuarkCore.so artifacts/
          find build -maxdepth 1 -type f -executable ! -name "*.so*" | xargs -I{} cp {} artifacts/
          find build -maxdepth 1 -name "*.so*" | xargs -I{} cp {} artifacts/
          cp -r include/. artifacts/include/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: QuarkCore-Linux-Binary
          path: artifacts/
          if-no-files-found: error
          retention-days: 5